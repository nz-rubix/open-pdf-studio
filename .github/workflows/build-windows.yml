name: Build Windows installers

# Native Windows builds for arm64 and x64.
# Produces unsigned perMachine NSIS installers.
# The upstream auto-updater is neutered in these builds: its endpoint points
# at this repo's (empty) releases, so update checks fail harmlessly and an
# install can never "update" itself onto a mismatched-architecture build.

on:
  workflow_dispatch:
  push:
    branches:
      - windows-build
    paths:
      - 'open-pdf-studio/**'
      - 'pdfium-worker/**'
      - '.github/workflows/build-windows.yml'

# A newer push supersedes an in-flight build of the same branch; don't burn
# runners (or race artifact downloads) finishing installers nobody will use.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: windows-11-arm
            machine: 'AA64'
          - arch: x64
            runner: windows-latest
            machine: '8664'
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: open-pdf-studio

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable (native host)
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Configure bundle
        shell: pwsh
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json

          if ($env:BUILD_ARCH -eq 'arm64') {
            # Swap the x64-only bundled resources for their win-arm64 twins
            # (see src-tauri/binaries/win-arm64/README.md for provenance).
            $res = [ordered]@{
              'icons/file-icon.ico'                     = 'file-icon.ico'
              'binaries/win-arm64/pdfium.dll'           = 'pdfium.dll'
              'binaries/win-arm64/WebView2Loader.dll'   = 'WebView2Loader.dll'
              'resources/kaders'                        = 'kaders'
            }
            $conf.bundle.resources = $res
          }

          # Focused build: no in-app fetches remain (updater check, release
          # notes, assistant, feedback are all compiled out below), so drop
          # the blanket https: from connect-src.
          $conf.app.security.csp = $conf.app.security.csp -replace 'connect-src ([^;]*?) https:', 'connect-src $1'

          # Neuter the updater rather than removing it: the plugin is
          # registered unconditionally in lib.rs and panics at startup on a
          # missing/null plugins.updater config (exit 101). Keep the config
          # valid but point the endpoint at THIS repo's releases - none are
          # published, so update checks 404 harmlessly, and upstream's pubkey
          # can't verify anything served from here anyway.
          $conf.bundle.createUpdaterArtifacts = $false
          $conf.plugins.updater.endpoints = @("https://github.com/$env:GITHUB_REPOSITORY/releases/latest/download/latest.json")

          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          Get-Content src-tauri/tauri.conf.json | Select-String -Pattern 'win-arm64|createUpdaterArtifacts|connect-src'

          # Lean build: the virtual-printer feature is compiled out of the app
          # (OPS_FEATURE_VPRINTER=false), so skip its installer wizard page too.
          # An immediate Abort in a page-create function makes NSIS skip the page.
          $hooks = Get-Content src-tauri/nsis/hooks.nsh -Raw
          $hooks = $hooks -replace 'Function VPrinterPageCreate', "Function VPrinterPageCreate`n  Abort ; lean build: virtual printer not offered"
          Set-Content src-tauri/nsis/hooks.nsh $hooks
          Select-String -Path src-tauri/nsis/hooks.nsh -Pattern 'lean build: virtual printer'

      # npm run tauri:build = prebuild hook (cargo build --release -p pdfium-worker)
      # + vite build + tauri build. src-tauri/build.rs derives the sidecar's
      # target-triple suffix from $TARGET, which matches the native host on
      # both runners - no manual sidecar copy step needed.
      - name: Build Tauri app
        env:
          # Lean, focused build: compile out non-core subsystems (they stay
          # in the source, gated behind build-time flags that default ON).
          OPS_FEATURE_ASSISTANT: 'false'
          OPS_FEATURE_ACCOUNTS: 'false'
          OPS_FEATURE_FEEDBACK: 'false'
          OPS_FEATURE_PLUGINS: 'false'
          OPS_FEATURE_MCP: 'false'
          OPS_FEATURE_UPDATER: 'false'
          OPS_FEATURE_WHATSNEW: 'false'
          OPS_FEATURE_VPRINTER: 'false'
        run: npm run tauri:build

      - name: Verify installer architecture
        shell: pwsh
        working-directory: .
        env:
          EXPECTED_MACHINE: ${{ matrix.machine }}
        run: |
          $setup = Get-ChildItem target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $setup) { Write-Error "No NSIS installer produced"; exit 1 }
          Write-Output "Installer: $($setup.Name) ($([math]::Round($setup.Length/1MB,1)) MB)"
          $exe = "target/release/open-pdf-studio.exe"
          $bytes = [System.IO.File]::ReadAllBytes($exe)
          $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
          $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $expected = [Convert]::ToUInt16($env:EXPECTED_MACHINE, 16)
          Write-Output ("Machine type: 0x{0:X4} (expected 0x{1:X4})" -f $machine, $expected)
          if ($machine -ne $expected) { Write-Error "Main exe architecture mismatch!"; exit 1 }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenPDFStudio-windows-${{ matrix.arch }}-setup
          path: |
            target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 30
