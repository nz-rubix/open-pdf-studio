name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.50.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open PDF Studio ${version}`,
              body: `## What's New in ${version}\n\nFree, open-source PDF annotation editor built with Tauri.\n\n### Downloads\n- **Windows (System)**: Download the \`*_x64-setup.exe\` installer for system-wide installation (requires admin)\n- **Windows (User)**: Download the \`*_x64_user-setup.exe\` installer for current user only (no admin required)\n- **macOS**: Download the \`.dmg\` file (universal - supports Intel and Apple Silicon)\n- **Linux**: Download the \`.deb\` package, \`.AppImage\`, or \`.snap\` (also available on the [Snap Store](https://snapcraft.io/open-pdf-studio))\n\n### Features\n- PDF viewing and navigation\n- Text selection and search\n- Annotations: highlight, underline, strikethrough\n- Drawing tools: freehand, shapes, text\n- Multi-tab document support\n- Thumbnail navigation\n- Session restore`,
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'linux'
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'macos'
          - platform: 'windows-latest'
            args: ''
            target: 'windows-system'
          - platform: 'windows-latest'
            args: ''
            target: 'windows-user'

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 'tauri2026'
    defaults:
      run:
        working-directory: open-pdf-studio

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS universal)
        if: matrix.target == 'macos'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu only)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # The PDFium worker pool runs as a Tauri sidecar (bundle.externalBin).
      # Tauri requires binaries/pdfium-worker-<target-triple> to exist at
      # build time on EVERY desktop platform, so build the workspace crate
      # first and drop it in with the right triple suffix.
      - name: Build pdfium-worker sidecar (Windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        working-directory: .
        run: |
          cargo build --release -p pdfium-worker
          New-Item -ItemType Directory -Force open-pdf-studio/src-tauri/binaries | Out-Null
          Copy-Item target/release/pdfium-worker.exe open-pdf-studio/src-tauri/binaries/pdfium-worker-x86_64-pc-windows-msvc.exe -Force

      # Sign the pdfium-worker sidecar BEFORE Tauri bundles it into the installer.
      # The installer-signing step below only signs the installer + main exe; the
      # sidecar is extracted to disk UNSIGNED, which some AV engines flag as a
      # heuristic false-positive and quarantine (Symantec Heur.AdvML.B, #245).
      # Signing it here means the extracted worker.exe carries a trusted signature.
      - name: Authenticode sign pdfium-worker sidecar (Windows)
        if: contains(matrix.target, 'windows')
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          cache-dependencies: false
          files-folder: ${{ github.workspace }}/open-pdf-studio/src-tauri/binaries
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Build pdfium-worker sidecar (Linux)
        if: matrix.target == 'linux'
        working-directory: .
        run: |
          cargo build --release -p pdfium-worker
          mkdir -p open-pdf-studio/src-tauri/binaries
          cp target/release/pdfium-worker open-pdf-studio/src-tauri/binaries/pdfium-worker-x86_64-unknown-linux-gnu

      # Linux bundelt in-proc PDFium: tauri.linux.conf.json verwijst naar
      # binaries/linux-x64/libpdfium.so. Zelfde stap als nightly.yml — zonder
      # deze fetch faalt tauri-build op 'resource path doesn't exist'.
      - name: Fetch libpdfium.so (Linux)
        if: matrix.target == 'linux'
        run: |
          mkdir -p src-tauri/binaries/linux-x64
          curl -L "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7834/pdfium-linux-x64.tgz" -o /tmp/pdfium-linux.tgz
          tar xzf /tmp/pdfium-linux.tgz -C /tmp lib/libpdfium.so
          cp /tmp/lib/libpdfium.so src-tauri/binaries/linux-x64/libpdfium.so

      - name: Build pdfium-worker sidecar (macOS universal)
        if: matrix.target == 'macos'
        working-directory: .
        run: |
          cargo build --release -p pdfium-worker --target aarch64-apple-darwin
          cargo build --release -p pdfium-worker --target x86_64-apple-darwin
          mkdir -p open-pdf-studio/src-tauri/binaries
          # tauri-build validates the sidecar PER ARCH during the per-target
          # cargo builds of a universal bundle, so all three names must exist.
          cp target/aarch64-apple-darwin/release/pdfium-worker open-pdf-studio/src-tauri/binaries/pdfium-worker-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/pdfium-worker open-pdf-studio/src-tauri/binaries/pdfium-worker-x86_64-apple-darwin
          lipo -create -output open-pdf-studio/src-tauri/binaries/pdfium-worker-universal-apple-darwin \
            target/aarch64-apple-darwin/release/pdfium-worker \
            target/x86_64-apple-darwin/release/pdfium-worker

      - name: Set user install mode
        if: matrix.target == 'windows-user'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.bundle.windows.nsis.installMode = "currentUser"
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      # WebView2Loader.dll is committed in src-tauri/ and bundled via
      # bundle.resources — just verify it's there. (The old pre-build step
      # searched src-tauri/target, which no longer exists since the crate
      # moved into the workspace: the target dir lives at the repo root.)
      - name: Verify WebView2Loader.dll resource (Windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          if (Test-Path 'src-tauri/WebView2Loader.dll') {
            Write-Output "OK: src-tauri/WebView2Loader.dll present (bundled as resource)"
          } else {
            Write-Error "src-tauri/WebView2Loader.dll missing - NSIS bundle would lack the loader"
            exit 1
          }

      - name: Build Tauri app (with release upload)
        if: matrix.target != 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: open-pdf-studio
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

      - name: Build Tauri app (user installer)
        if: matrix.target == 'windows-user'
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: open-pdf-studio
          args: ${{ matrix.args }}

      - name: Authenticode sign Windows installer
        if: contains(matrix.target, 'windows')
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          cache-dependencies: false
          # Workspace target dir lives at the repo root (src-tauri is a member)
          files-folder: ${{ github.workspace }}/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode signing
        if: matrix.target == 'windows-system'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          # Workspace target dir lives at the repo root (src-tauri is a member)
          $NSIS_DIR = "$env:GITHUB_WORKSPACE/target/release/bundle/nsis"

          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $ZIP = Get-ChildItem "$NSIS_DIR/*.nsis.zip" | Select-Object -First 1

          Write-Host "Signed exe: $($EXE.Name)"
          Write-Host "Old zip: $($ZIP.Name)"

          # Re-create .nsis.zip with the Authenticode-signed exe
          # Use ZipFile API with Deflate compression (Compress-Archive can use
          # Deflate64 which Tauri's updater does not support)
          $ZIP_PATH = $ZIP.FullName
          Remove-Item $ZIP_PATH
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($ZIP_PATH, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($archive, $EXE.FullName, $EXE.Name, [System.IO.Compression.CompressionLevel]::Optimal)
          $archive.Dispose()

          # Re-generate updater signatures for both files
          # tauri signer sign writes a .sig file next to the input file
          npx tauri signer sign "$($EXE.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          npx tauri signer sign "$($ZIP.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Read the generated .sig files
          $EXE_SIG = Get-Content "$($EXE.FullName).sig" -Raw
          $ZIP_SIG = Get-Content "$($ZIP.FullName).sig" -Raw

          Write-Host "New exe signature: $($EXE_SIG.Substring(0, 50))..."
          Write-Host "New zip signature: $($ZIP_SIG.Substring(0, 50))..."

          # Download latest.json from release, update Windows signatures
          gh release download $VERSION --pattern "latest.json" --output latest.json --clobber --repo "${{ github.repository }}"

          $latest = Get-Content latest.json -Raw | ConvertFrom-Json

          foreach ($key in @('windows-x86_64')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $ZIP_SIG
              Write-Host "Updated signature for $key"
            }
          }
          foreach ($key in @('windows-x86_64-nsis')) {
            if ($latest.platforms.PSObject.Properties[$key]) {
              $latest.platforms.$key.signature = $EXE_SIG
              Write-Host "Updated signature for $key"
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -NoNewline

          # Re-upload all modified files
          gh release upload $VERSION "$($EXE.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($EXE.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName)" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION "$($ZIP.FullName).sig" --clobber --repo "${{ github.repository }}"
          gh release upload $VERSION latest.json --clobber --repo "${{ github.repository }}"

          Write-Host "All Windows artifacts re-uploaded with correct signatures"

      - name: Upload user installer to release
        if: matrix.target == 'windows-user'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $VERSION = "${{ needs.create-release.outputs.version }}"
          # Workspace target dir lives at the repo root (src-tauri is a member)
          $NSIS_DIR = "$env:GITHUB_WORKSPACE/target/release/bundle/nsis"
          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          # Rename: "Open PDF Studio_x.y.z_x64-setup.exe" -> "Open PDF Studio_x.y.z_x64_user-setup.exe"
          $NEW_NAME = $EXE.Name -replace '_x64-setup\.exe$', '_x64_user-setup.exe'
          $NEW_PATH = Join-Path $EXE.DirectoryName $NEW_NAME
          Rename-Item $EXE.FullName $NEW_PATH
          gh release upload $VERSION "$NEW_PATH" --clobber --repo "${{ github.repository }}"
          Write-Host "Uploaded user installer: $NEW_NAME"

  build-android:
    needs: create-release
    # Non-blocking: a failed Android build must NOT hold back the desktop
    # release (Windows/Linux/macOS). It uploads its APK independently.
    continue-on-error: true
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: open-pdf-studio

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: open-pdf-studio/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            open-pdf-studio/src-tauri/target
          key: android-rust-${{ hashFiles('open-pdf-studio/src-tauri/Cargo.lock') }}
          restore-keys: |
            android-rust-

      - name: Install frontend dependencies
        run: npm install

      - name: Strip desktop sidecar from config (no sidecars on Android)
        run: node -e "const fs=require('fs');const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));delete c.bundle.externalBin;fs.writeFileSync(f,JSON.stringify(c,null,2));"

      - name: Initialize Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Build Android APK
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        id: sign-apk
        run: |
          # Find the unsigned APK
          UNSIGNED_APK=$(find src-tauri/gen/android -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            exit 1
          fi
          echo "Found unsigned APK: $UNSIGNED_APK"
          APK_DIR=$(dirname "$UNSIGNED_APK")

          # Generate a signing keystore
          keytool -genkeypair -v \
            -keystore "$APK_DIR/release.keystore" \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass openpdfstudio -keypass openpdfstudio \
            -dname "CN=Open PDF Studio, O=OpenAEC Foundation, L=Unknown, ST=Unknown, C=US"

          # Find the build-tools for zipalign and apksigner
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          echo "Using build-tools: $BUILD_TOOLS"

          # Zipalign the APK
          ALIGNED_APK="$APK_DIR/app-universal-release-aligned.apk"
          "${BUILD_TOOLS}zipalign" -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          # Sign the APK
          SIGNED_APK="$APK_DIR/open-pdf-studio-release.apk"
          "${BUILD_TOOLS}apksigner" sign \
            --ks "$APK_DIR/release.keystore" \
            --ks-key-alias release \
            --ks-pass pass:openpdfstudio \
            --key-pass pass:openpdfstudio \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # Verify the signature
          "${BUILD_TOOLS}apksigner" verify --verbose "$SIGNED_APK"
          echo "signed_apk=$SIGNED_APK" >> $GITHUB_OUTPUT
          echo "Signed APK: $SIGNED_APK"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: open-pdf-studio/src-tauri/gen/android/**/open-pdf-studio-release.apk
          if-no-files-found: warn

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          SIGNED_APK=$(find src-tauri/gen/android -name "open-pdf-studio-release.apk" -type f | head -1)
          if [ -n "$SIGNED_APK" ]; then
            gh release upload "$VERSION" "$SIGNED_APK" --clobber --repo "${{ github.repository }}"
          fi

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    # Android intentionally omitted — it must not gate the desktop release.
    needs: [create-release, build]

    steps:
      - name: Finalize release
        id: publish-release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            // Release blijft een concept (draft): publicatie is een bewuste,
            // handmatige stap — builds zijn intern tot expliciete vrijgave.
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: true,
              prerelease: false
            });
