name: Render regression

on:
  pull_request:
    paths:
      - 'open-pdf-render/**'
      - 'open-pdf-studio/src-tauri/**'
      - 'open-pdf-studio/js/pdf/**'
      - 'scripts/render_test/**'
      - 'scripts/run-render-regression.mjs'
      - 'scripts/render-regression-test.py'
      - 'scripts/requirements-test.txt'
  workflow_dispatch:

jobs:
  render-regression:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'open-pdf-studio/package-lock.json'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo registry + target
        id: cargo-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: render-regression-v2-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install npm deps (open-pdf-studio)
        working-directory: open-pdf-studio
        run: npm ci

      - name: Prebuild desktop app
        shell: pwsh
        run: |
          cargo build -p pdfium-worker
          New-Item -ItemType Directory -Force open-pdf-studio/src-tauri/binaries | Out-Null
          Copy-Item target/debug/pdfium-worker.exe open-pdf-studio/src-tauri/binaries/pdfium-worker-x86_64-pc-windows-msvc.exe -Force
          cargo build -p open-pdf-studio

      - name: Save cargo registry + target
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: render-regression-v2-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up python venv
        shell: bash
        run: |
          python -m venv scripts/.venv-test
          scripts/.venv-test/Scripts/python.exe -m pip install -U pip
          scripts/.venv-test/Scripts/python.exe -m pip install -r scripts/requirements-test.txt

      - name: Run render regression
        working-directory: open-pdf-studio
        env:
          OPS_ENABLE_MCP: '1'
          OPS_TEST_PDFS_DIR: ${{ github.workspace }}/open-pdf-studio/src-tauri/resources/kaders
        run: npm run test:render:auto -- --pdf grootformaat_a1_liggend.pdf --out-root "../test pdf-bestanden/render-regression-runs"

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-regression-${{ github.run_id }}
          path: 'test pdf-bestanden/render-regression-runs/'
          if-no-files-found: warn
          retention-days: 14
