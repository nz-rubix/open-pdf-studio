<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Open PDF Studio</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <script>
    try { const p = JSON.parse(localStorage.getItem('pdfEditorPreferences') || '{}');
      if (p.theme) {
        let t = p.theme;
        if (t === 'system') {
          try { t = window.__TAURI__?.window?.getCurrentWindow()?.theme() === 'dark' ? 'dark' : 'light'; }
          catch(e2) { t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        }
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch(e) {}
  </script>
</head>
<body>
  <div id="app-root"></div>

  <!-- Crop Margins Dialog -->
  <div class="crop-margins-overlay" id="crop-margins-dialog">
    <div class="crop-margins-dialog">
      <div class="crop-margins-header">
        <h2>Crop Margins</h2>
        <button class="crop-margins-close-btn" id="crop-margins-close-btn">&times;</button>
      </div>
      <div class="crop-margins-content">
        <div class="crop-margins-form">
          <div class="crop-margins-row">
            <label class="crop-margins-label">Apply to:</label>
            <select id="crop-margins-apply" class="crop-margins-select">
              <option value="current">Current page</option>
              <option value="all">All pages</option>
              <option value="range">Page range</option>
            </select>
          </div>
          <div class="crop-margins-row" id="crop-margins-range-row" style="display:none">
            <label class="crop-margins-label">Pages:</label>
            <input type="text" id="crop-margins-range" class="crop-margins-input-wide" placeholder="e.g. 1-3, 5, 8-10">
          </div>
          <div class="crop-margins-row">
            <label class="crop-margins-label">Padding (mm):</label>
            <input type="number" id="crop-margins-padding" class="crop-margins-input" value="0" min="0" max="50" step="1">
          </div>
          <div class="crop-margins-row">
            <label class="crop-margins-label">Threshold:</label>
            <input type="range" id="crop-margins-threshold" min="200" max="255" value="250" class="crop-margins-slider">
            <span id="crop-margins-threshold-value" class="crop-margins-threshold-value">250</span>
          </div>
          <div class="crop-margins-info" id="crop-margins-info"></div>
        </div>
      </div>
      <div class="crop-margins-footer">
        <div></div>
        <div class="crop-margins-footer-right">
          <button class="pref-btn pref-btn-primary" id="crop-margins-ok-btn">Crop</button>
          <button class="pref-btn pref-btn-secondary" id="crop-margins-cancel-btn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js" type="module"></script>
</body>
</html>
